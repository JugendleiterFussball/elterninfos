<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dokumente für Eltern</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #333;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-decoration: none;
      color: #2c3e50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }

    .badge {
      background: #3498db;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <h1>📄 Dokumente für Eltern</h1>
  <p>Alle wichtigen Formulare schnell und einfach verfügbar</p>
</header>

<div class="container">

  <div class="grid">

    <a class="card" href="Aenderung_Bankverbindung.pdf" target="_blank">
      Änderung Bankverbindung <span class="badge">PDF</span>
    </a>

    <a class="card" href="Aufnahmeantrag.pdf" target="_blank">
      Aufnahmeantrag <span class="badge">PDF</span>
    </a>

    <a class="card" href="Austrittserklaerung.pdf" target="_blank">
      Austrittserklärung <span class="badge">PDF</span>
    </a>

    <a class="card" href="Fotogenehmigung_einzeln.pdf" target="_blank">
      Fotogenehmigung <span class="badge">PDF</span>
    </a>

    <a class="card" href="Spielerlaubnisantrag_SFV_neu.pdf" target="_blank">
      Spielerlaubnis SFV <span class="badge">PDF</span>
    </a>

    <a class="card" href="Unfallmeldung.pdf" target="_blank">
      Unfallmeldung <span class="badge">PDF</span>
    </a>

    <a class="card" href="antrag_internationalefreigabe_012026.pdf" target="_blank">
      Internationale Freigabe <span class="badge">PDF</span>
    </a>

  </div>

</div>

<footer>
  © Dokumentenportal – einfach & schnell zugänglich
</footer>

</body>
</html>
