<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vereinsportal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7f6;
      color: #1a1a1a;
    }

    header {
      background: #0b5d2a; /* Grün */
      color: white;
      text-align: center;
      padding: 30px 20px;
    }

    .logo {
      width: 100px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0 5px;
      font-size: 28px;
    }

    p {
      margin: 0;
      opacity: 0.9;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .section-title {
      margin: 25px 0 10px;
      font-size: 18px;
      color: #0b5d2a;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      text-decoration: none;
      color: #1a1a1a;
      font-weight: bold;
      border-left: 6px solid #0b5d2a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    .badge {
      float: right;
      background: #0b5d2a;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    footer {
      text-align: center;
      padding: 25px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

<header>
  <img src="Logo.png" alt="Vereinslogo" class="logo">
  <h1>⚽ Vereinsportal</h1>
  <p>Dokumente & Informationen für Eltern und Mitglieder</p>
</header>

<div class="container">

  <div class="section-title">📄 Elternbereich – Formulare</div>

  <div class="grid">
    <a class="card" href="Aenderung_Bankverbindung.pdf">Bankverbindung ändern <span class="badge">PDF</span></a>
    <a class="card" href="Aufnahmeantrag.pdf">Aufnahmeantrag <span class="badge">PDF</span></a>
    <a class="card" href="Austrittserklaerung.pdf">Austrittserklärung <span class="badge">PDF</span></a>
    <a class="card" href="Fotogenehmigung_einzeln.pdf">Fotogenehmigung <span class="badge">PDF</span></a>
    <a class="card" href="Spielerlaubnisantrag_SFV_neu.pdf">Spielerlaubnis SFV <span class="badge">PDF</span></a>
    <a class="card" href="Unfallmeldung.pdf">Unfallmeldung <span class="badge">PDF</span></a>
    <a class="card" href="antrag_internationalefreigabe_012026.pdf">Internationale Freigabe <span class="badge">PDF</span></a>
  </div>


</div>

<footer>
  🟢 ⚪ ⚫ Vereinsportal
</footer>

</body>
</html>
