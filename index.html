<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vereinsdokumente</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: #0b3d1f;
      text-align: center;
      padding: 30px 20px;
    }

    .logo {
      width: 110px;
      height: auto;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0 5px;
      font-size: 26px;
    }

    p {
      margin: 0;
      opacity: 0.8;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
      border-left: 6px solid #0b3d1f;
    }

    .card:hover {
      transform: scale(1.03);
      background: #f2f2f2;
    }

    .badge {
      background: #0b3d1f;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<header>
  <!-- 🔥 LOGO DATEINAME HIER ANPASSEN -->
  <img src="reenshot am 30.03.2026 120734.png" alt="Vereinslogo" class="logo">

  <h1>⚽ Vereinsdokumente</h1>
  <p>Alle wichtigen Formulare für Eltern & Spieler</p>
</header>

<div class="container">

  <div class="grid">

    <a class="card" href="Aenderung_Bankverbindung.pdf" target="_blank">
      Bankverbindung ändern <span class="badge">PDF</span>
    </a>

    <a class="card" href="Aufnahmeantrag.pdf" target="_blank">
      Aufnahmeantrag <span class="badge">PDF</span>
    </a>

    <a class="card" href="Austrittserklaerung.pdf" target="_blank">
      Austrittserklärung <span class="badge">PDF</span>
    </a>

    <a class="card" href="Fotogenehmigung_einzeln.pdf" target="_blank">
      Fotogenehmigung <span class="badge">PDF</span>
    </a>

    <a class="card" href="Spielerlaubnisantrag_SFV_neu.pdf" target="_blank">
      Spielerlaubnis SFV <span class="badge">PDF</span>
    </a>

    <a class="card" href="Unfallmeldung.pdf" target="_blank">
      Unfallmeldung <span class="badge">PDF</span>
    </a>

    <a class="card" href="antrag_internationalefreigabe_012026.pdf" target="_blank">
      Internationale Freigabe <span class="badge">PDF</span>
    </a>

  </div>

</div>

<footer>
  🟢 ⚪ ⚫ Vereinsportal – einfach & schnell erreichbar
</footer>

</body>
</html>
